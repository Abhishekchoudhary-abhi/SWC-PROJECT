spring.application.name=cinepass-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cinepass}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}

# JWT Configuration
cinepass.app.jwtSecret=${JWT_SECRET:change-me-in-.env}
cinepass.app.jwtExpirationMs=${JWT_EXPIRATION_MS:3600000}

# Auth Configuration
logging.level.org.springframework.security=DEBUG

# File Storage
cinepass.upload.dir=${UPLOAD_DIR:uploads/}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
