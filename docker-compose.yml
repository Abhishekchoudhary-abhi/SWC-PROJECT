version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinepass-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cinepass}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cinepass-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cinepass-mq
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./cinepass-backend
    container_name: cinepass-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cinepass}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      JWT_SECRET: ${JWT_SECRET:-change-me-in-.env}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  frontend:
    build: ./cinepass-frontend
    container_name: cinepass-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
